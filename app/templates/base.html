<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f59e0b">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="/static/icons/icon-192.png">
  <title>{% block title %}Summer{% endblock %}</title>
  <script>
    // Apply persisted dark mode synchronously before paint to avoid a
    // white flash. The toggle is in app.js; this only sets the attribute.
    (function () {
      try {
        var t = localStorage.getItem("summer-theme");
        if (t === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) { /* localStorage may be unavailable */ }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
  {% block head_extra %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="topbar">
    <a class="brand" href="/">
      <span class="brand-emoji">☀️</span>
      <span class="brand-text">Summer</span>
    </a>
    <nav class="topnav">
      <button type="button" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="theme-icon-light" aria-hidden="true">🌙</span>
        <span class="theme-icon-dark" aria-hidden="true">☀️</span>
      </button>
      <a href="/chores">Chores</a>
      <a href="/rewards">Rewards</a>
      {% if is_parent %}
        <a href="/parent" class="nav-admin">Parent</a>
        <a href="/logout" class="nav-logout">Log out</a>
      {% else %}
        <a href="/login" class="nav-admin">Parent</a>
      {% endif %}
      <span class="app-version" title="App version">v{{ app_version }}</span>
    </nav>
  </header>

  {% if msg %}
    <div class="flash flash-msg" role="status">{{ msg }}</div>
  {% endif %}
  {% if error %}
    <div class="flash flash-error" role="alert">{{ error }}</div>
  {% endif %}

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <nav class="bottombar" aria-label="Quick navigation">
    <a href="/">
      <span class="bb-icon">🏠</span><span>Home</span>
    </a>
    <a href="/chores">
      <span class="bb-icon">📋</span><span>Chores</span>
    </a>
    <a href="/rewards">
      <span class="bb-icon">🎁</span><span>Rewards</span>
    </a>
    <a href="{% if is_parent %}/parent{% else %}/login{% endif %}">
      <span class="bb-icon">👪</span><span>Parent</span>
    </a>
  </nav>

  <script src="/static/app.js" defer></script>
</body>
</html>
