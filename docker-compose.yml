services:
  summer:
    # `image:` makes `docker compose up` pull the prebuilt image from
    # ghcr.io (fast). `build: .` is kept as a fallback for fresh checkouts
    # before the workflow has run, offline use, and local development via
    # `docker compose build`.
    build: .
    image: ghcr.io/abateman121/summer:latest
    container_name: summer
    env_file: ./.env
    environment:
      - DATABASE_URL=sqlite:////app/data/summer.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
