services:
  summer:
    build: .
    image: summer:latest
    container_name: summer
    env_file: ./.env
    environment:
      - DATABASE_URL=sqlite:////app/data/summer.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
